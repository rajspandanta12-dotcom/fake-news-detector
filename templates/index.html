<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .glass-card {
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .ai-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(10,10,20,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            color: white;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 1rem 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card h3 {
            margin-bottom: 1rem;
        }

        .verdict {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .confidence-section {
            margin: 1rem 0;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .confidence-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #51cf66, #94d82d);
            transition: width 1s ease;
            border-radius: 10px;
        }

        .timestamp {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1rem;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            border-radius: 1rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .glass-card {
                padding: 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="ai-badge">
                    🤖 AI-POWERED
                </div>
                <h1>
                    🛡️ Fake News Detector
                </h1>
                <p>Deteksi berita palsu dengan kecerdasan buatan</p>
            </div>

            <div class="input-section">
                <label>📰 Masukkan teks berita</label>
                <textarea id="newsText" rows="6" placeholder="Contoh: Breaking news..."></textarea>
            </div>

            <div class="action-buttons">
                <button id="detectBtn" class="btn-primary">
                    🔍 Deteksi Sekarang
                </button>
                <button id="clearBtn" class="btn-secondary">
                    🧹 Bersihkan
                </button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Menganalisis dengan AI...</p>
            </div>

            <div id="result" class="result-card hidden">
                <h3>📊 Hasil Analisis</h3>
                <div class="verdict" id="verdict"></div>
                <div class="confidence-section">
                    <div class="confidence-label">
                        <span>Confidence Score</span>
                        <span id="confidenceValue">0%</span>
                    </div>
                    <div class="confidence-bar">
                        <div id="confidenceFill" class="confidence-fill"></div>
                    </div>
                </div>
                <div class="timestamp" id="timestamp"></div>
            </div>

            <div class="footer">
                <p>Powered by Machine Learning | Naive Bayes + TF-IDF</p>
            </div>
        </div>
    </div>

    <script>
        // Ambil elemen-elemen yang dibutuhkan
        const newsText = document.getElementById('newsText');
        const detectBtn = document.getElementById('detectBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const verdictDiv = document.getElementById('verdict');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        const timestamp = document.getElementById('timestamp');

        // Tombol Deteksi
        detectBtn.addEventListener('click', async function() {
            const text = newsText.value.trim();
            
            // Validasi minimal karakter
            if (text.length < 10) {
                alert('⚠️ Masukkan teks berita minimal 10 karakter!');
                return;
            }
            
            // Sembunyikan hasil, tampilkan loading
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            
            try {
                // Kirim request ke server
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ news_text: text })
                });
                
                // Ambil data dari server
                const data = await response.json();
                
                if (response.ok) {
                    // Tampilkan hasil prediksi
                    if (data.is_fake) {
                        verdictDiv.innerHTML = '❌ FAKE NEWS - Berita ini terindikasi PALSU!';
                        verdictDiv.style.color = '#ff6b6b';
                    } else {
                        verdictDiv.innerHTML = '✅ REAL NEWS - Berita ini terverifikasi ASLI!';
                        verdictDiv.style.color = '#51cf66';
                    }
                    
                    confidenceValue.textContent = data.confidence + '%';
                    confidenceFill.style.width = data.confidence + '%';
                    timestamp.textContent = data.timestamp;
                    
                    result.classList.remove('hidden');
                } else {
                    // Tampilkan error dari server
                    alert('❌ Error: ' + (data.error || 'Terjadi kesalahan'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Gagal connect ke server!\n\nPastikan server sudah jalan dengan perintah:\npython app.py\n\nLalu refresh halaman ini.');
            } finally {
                loading.classList.add('hidden');
            }
        });
        
        // Tombol Bersihkan
        clearBtn.addEventListener('click', function() {
            newsText.value = '';
            result.classList.add('hidden');
            newsText.focus();
        });
    </script>
</body>
</html>
